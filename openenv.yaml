name: crypto-trading-env
title: Cryptocurrency Trading Environment
description: A reinforcement learning environment for simulating cryptocurrency trading with multiple assets
version: 0.1.0
author: OpenEnv Hackathon Participant
license: MIT
tags:
  - trading
  - finance
  - cryptocurrency
  - reinforcement-learning
environments:
  - id: CryptoTradingEnv-v0
    entry_point: crypto_trading_env.crypto_trading_env:CryptoTradingEnv
    kwargs:
      symbols: ['BTC-USD', 'ETH-USD', 'BNB-USD', 'XRP-USD', 'LTC-USD']
      initial_balance: 10000
      transaction_fee: 0.001
      lookback_window: 10
  - id: CryptoTradingEnv-Easy-v0
    entry_point: crypto_trading_env.crypto_trading_env:CryptoTradingEnv
    kwargs:
      symbols: ['BTC-USD', 'ETH-USD']
      initial_balance: 1000
      transaction_fee: 0.001
      lookback_window: 5
  - id: CryptoTradingEnv-Medium-v0
    entry_point: crypto_trading_env.crypto_trading_env:CryptoTradingEnv
    kwargs:
      symbols: ['BTC-USD', 'ETH-USD', 'BNB-USD']
      initial_balance: 5000
      transaction_fee: 0.001
      lookback_window: 8
  - id: CryptoTradingEnv-Hard-v0
    entry_point: crypto_trading_env.crypto_trading_env:CryptoTradingEnv
    kwargs:
      symbols: ['BTC-USD', 'ETH-USD', 'BNB-USD', 'XRP-USD', 'LTC-USD', 'ADA-USD', 'DOT-USD']
      initial_balance: 50000
      transaction_fee: 0.001
      lookback_window: 15
rubrics:
  - id: basic_grader
    type: grader
    entry_point: crypto_trading_env.graders:BasicTradingGrader
  - id: intermediate_grader
    type: grader
    entry_point: crypto_trading_env.graders:IntermediateTradingGrader
  - id: advanced_grader
    type: grader
    entry_point: crypto_trading_env.graders:AdvancedTradingGrader
task_list:
  - id: crypto_trading_basic
    name: Basic Cryptocurrency Trading
    description: Trade BTC and ETH with a small initial balance to learn basic trading concepts
    environment_id: CryptoTradingEnv-Easy-v0
    difficulty: easy
    rubric_ids: [basic_grader]
    max_episode_steps: 100
    success_threshold: 0.1  # 10% return
  - id: crypto_trading_intermediate
    name: Intermediate Cryptocurrency Trading
    description: Trade multiple cryptocurrencies with moderate balance and position sizing
    environment_id: CryptoTradingEnv-Medium-v0
    difficulty: medium
    rubric_ids: [intermediate_grader]
    max_episode_steps: 200
    success_threshold: 0.25  # 25% return
  - id: crypto_trading_advanced
    name: Advanced Cryptocurrency Trading
    description: Trade multiple cryptocurrencies with advanced strategies and risk management
    environment_id: CryptoTradingEnv-Hard-v0
    difficulty: hard
    rubric_ids: [advanced_grader]
    max_episode_steps: 300
    success_threshold: 0.5  # 50% return